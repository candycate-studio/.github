name: metrics

# Карточка метрик организации candycate-studio (lowlighter/metrics):
# активность, языки, репозитории. Пишет profile/assets/metrics.svg.
#
# Guard: пока секрет ORG_METRICS_TOKEN не добавлен, шаг с метриками
# пропускается — плановые прогоны остаются зелёным no-op.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "41 4 * * *"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    env:
      HAS: ${{ secrets.ORG_METRICS_TOKEN != '' }}
    steps:
      - name: Сгенерировать карточку метрик
        if: env.HAS == 'true'
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ORG_METRICS_TOKEN }}
          user: candycate-studio
          template: classic
          base: "header, activity, community, repositories"
          plugin_languages: yes
          plugin_lines: yes
          filename: profile/assets/metrics.svg
          output_action: commit
          committer_message: "chore(profile): refresh metrics"

      - name: Секрет ORG_METRICS_TOKEN не задан — пропуск (no-op)
        if: env.HAS != 'true'
        run: echo "ORG_METRICS_TOKEN отсутствует — шаг metrics пропущен. Добавьте секрет, чтобы включить карточку."
